<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CRM VSP">
<title>CRM · verificacionsos.pe</title>
<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:    #0a2463;
    --secondary:  #3e92cc;
    --accent:     #1e6091;
    --light:      #f0f4f8;
    --white:      #ffffff;
    --text:       #1a1a2e;
    --text-light: #4a5568;
    --gold:       #d4af37;
    --gold-light: #f5e27a;
    --border:     #dde4ed;
    --shadow:     0 2px 12px rgba(10,36,99,0.09);
    --shadow-lg:  0 8px 32px rgba(10,36,99,0.14);
    --pending:    #e05c2a;
    --process:    #3e92cc;
    --done:       #1a9e5c;
    --radius:     14px;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Varela Round', sans-serif;
    background: var(--light);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* AUTH SCREEN */
  .auth-screen {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, var(--primary) 0%, var(--accent) 60%, var(--secondary) 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px; z-index: 999;
  }
  .auth-screen.hidden { display: none; }

  .auth-logo-wrap {
    display: flex; align-items: flex-end; gap: 10px;
    margin-bottom: 36px;
  }
  .auth-logo-v {
    background: linear-gradient(135deg, #b8941f 0%, #d4af37 50%, #b8941f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 4.2rem;
    display: inline-block;
    line-height: 1;
    font-weight: 600;
  }
  .auth-logo-text { display: flex; flex-direction: column; padding-bottom: 4px; }
  .auth-logo-ing  { font-size: 0.58rem; color: rgba(255,255,255,0.65); letter-spacing: 0.12em; }
  .auth-logo-name { font-size: 1.15rem; color: white; font-weight: 700; }
  .auth-logo-tag  { font-size: 0.52rem; color: rgba(255,255,255,0.45); letter-spacing: 0.2px; }

  .auth-card {
    background: white; border-radius: 20px;
    padding: 32px 28px; width: 100%; max-width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center;
  }

  .auth-spinner {
    width: 38px; height: 38px;
    border: 3px solid #e2e8f0; border-top-color: var(--secondary);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .auth-icon  { font-size: 34px; margin-bottom: 10px; }
  .auth-title { font-size: 1.15rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .auth-desc  { font-size: 0.8rem; color: var(--text-light); line-height: 1.6; margin-bottom: 22px; }
  .auth-desc.error { color: var(--pending); }

  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; background: white; color: #333;
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 16px; font-family: 'Varela Round', sans-serif;
    font-size: 0.88rem; cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 10px;
  }
  .btn-google:hover { border-color: var(--secondary); box-shadow: 0 2px 8px rgba(62,146,204,0.2); }
  .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-back-auth {
    width: 100%; background: none; border: none;
    font-family: 'Varela Round', sans-serif;
    font-size: 0.8rem; color: var(--text-light); cursor: pointer; padding: 8px;
  }
  .btn-back-auth:hover { color: var(--primary); }

  /* TOPBAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 10px) 20px 10px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 10px rgba(10,36,99,0.08);
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .btn-home {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--light); border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-light); font-size: 14px;
    text-decoration: none; transition: all 0.2s;
  }
  .btn-home:hover { background: var(--primary); color: white; border-color: var(--primary); }

  .topbar-brand .name { font-size: 0.85rem; font-weight: 700; color: var(--primary); }
  .topbar-brand .sub  { font-size: 0.62rem; color: var(--text-light); }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .user-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--light); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 4px 10px 4px 4px;
  }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
  .user-name   { font-size: 0.72rem; color: var(--text-light); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .btn-new {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white; border: none; border-radius: 10px;
    padding: 9px 16px; font-family: 'Varela Round', sans-serif;
    font-size: 0.82rem; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    box-shadow: 0 2px 8px rgba(10,36,99,0.22);
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-new:active { transform: scale(0.96); opacity: 0.9; }

  /* GOLD BAR */
  .gold-bar { height: 3px; background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%); }

  /* PAGE HEADER */
  .page-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    padding: 18px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-header-title { font-size: 1rem; font-weight: 700; color: white; }
  .page-header-sub   { font-size: 0.68rem; color: rgba(255,255,255,0.6); margin-top: 2px; }

  /* STATS */
  .stats-row {
    display: flex; gap: 10px;
    padding: 14px 20px 6px;
    overflow-x: auto; scrollbar-width: none;
  }
  .stats-row::-webkit-scrollbar { display: none; }

  .stat-chip {
    flex-shrink: 0; background: white; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 9px 14px;
    display: flex; align-items: center; gap: 7px;
    cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
  }
  .stat-chip.active { border-color: var(--primary); background: var(--primary); }
  .stat-chip.active .stat-label { color: rgba(255,255,255,0.75); }
  .stat-chip.active .stat-count { color: white; }

  .stat-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .stat-label { font-size: 0.65rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-count { font-size: 1rem; font-weight: 700; color: var(--primary); }

  /* SEARCH */
  .search-wrap { padding: 6px 20px 12px; }
  .search-input {
    width: 100%; background: white; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: 'Varela Round', sans-serif; font-size: 0.85rem;
    outline: none; box-shadow: var(--shadow); transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--secondary); }
  .search-input::placeholder { color: #b0bccf; }

  /* BOARD */
  .board { padding: 4px 20px calc(var(--safe-bottom) + 80px); }

  .col-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 8px; }
  .col-title  { display: flex; align-items: center; gap: 7px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-light); }
  .col-dot    { width: 8px; height: 8px; border-radius: 50%; }
  .col-count  { font-size: 0.68rem; color: var(--text-light); background: white; border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; box-shadow: var(--shadow); }

  /* CARD */
  .card {
    background: white; border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
    cursor: pointer; position: relative; overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
    animation: cardIn 0.22s ease;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .card:active { transform: scale(0.985); }
  .card:hover  { box-shadow: var(--shadow-lg); border-color: #c4d0df; }

  .card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px;
  }
  .card.pendiente::before { background: var(--pending); }
  .card.proceso::before   { background: var(--process); }
  .card.terminado::before { background: var(--done); }
  .card.card-urgent { background: #fff8f5; border-color: rgba(224,92,42,0.2); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
  .card-name   { font-size: 0.93rem; font-weight: 700; color: var(--primary); line-height: 1.3; flex: 1; }
  .card-menu-btn { background: none; border: none; color: #b0bccf; font-size: 20px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; transition: color 0.15s; }
  .card-menu-btn:hover { color: var(--text-light); }

  .card-client { font-size: 0.76rem; color: var(--secondary); display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
  .card-client::before { content: '●'; font-size: 5px; }

  .card-notes { font-size: 0.76rem; color: var(--text-light); line-height: 1.55; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); white-space: pre-wrap; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 6px; flex-wrap: wrap; }
  .card-type   { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; background: var(--light); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; color: var(--text-light); }
  .card-date   { font-size: 0.65rem; color: #b0bccf; }

  .status-pill { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; border-radius: 20px; padding: 3px 9px; }
  .status-pill.pendiente { background: rgba(224,92,42,0.1);  color: var(--pending); }
  .status-pill.proceso   { background: rgba(62,146,204,0.1); color: var(--process); }
  .status-pill.terminado { background: rgba(26,158,92,0.1);  color: var(--done); }

  .urgent-badge { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--pending); background: rgba(224,92,42,0.1); border-radius: 5px; padding: 2px 7px; }

  .empty-col { border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 22px; text-align: center; color: #b0bccf; font-size: 0.78rem; margin-bottom: 8px; }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,36,99,0.3);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    z-index: 200; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: white; border-radius: 20px 20px 0 0; width: 100%;
    padding: 20px 20px calc(var(--safe-bottom) + 24px);
    transform: translateY(24px);
    transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
    max-height: 92dvh; overflow-y: auto;
    box-shadow: 0 -6px 40px rgba(10,36,99,0.15);
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title  {
    font-size: 1.05rem; font-weight: 700; color: var(--primary);
    margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .modal-title::before { content:''; width:4px; height:20px; border-radius:2px; background: linear-gradient(180deg,var(--primary),var(--secondary)); }

  .field-group  { margin-bottom: 13px; }
  .field-label  { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin-bottom: 6px; display: block; }
  .field-input, .field-select, .field-textarea {
    width: 100%; background: var(--light); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 13px; color: var(--text);
    font-family: 'Varela Round', sans-serif; font-size: 0.88rem;
    outline: none; transition: border-color 0.2s; -webkit-appearance: none;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--secondary); background: white; }
  .field-textarea { resize: none; height: 76px; line-height: 1.55; }

  .status-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 13px; }
  .status-btn {
    background: var(--light); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 4px; color: var(--text-light);
    font-family: 'Varela Round', sans-serif; font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .status-btn.active-pendiente { background: rgba(224,92,42,0.08);  border-color: var(--pending); color: var(--pending); }
  .status-btn.active-proceso   { background: rgba(62,146,204,0.08); border-color: var(--process); color: var(--process); }
  .status-btn.active-terminado { background: rgba(26,158,92,0.08);  border-color: var(--done);    color: var(--done); }

  .urgent-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .toggle-label  { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); }
  .toggle { width: 42px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; border: none; }
  .toggle.on { background: var(--pending); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .toggle.on .toggle-thumb { transform: translateX(18px); }

  .btn-row    { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
  .btn-cancel { background: var(--light); border: 1.5px solid var(--border); border-radius: 10px; padding: 13px; color: var(--text-light); font-family: 'Varela Round', sans-serif; font-size: 0.88rem; cursor: pointer; transition: border-color 0.2s; }
  .btn-cancel:hover { border-color: var(--text-light); }
  .btn-save   { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); border: none; border-radius: 10px; padding: 13px; color: white; font-family: 'Varela Round', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; box-shadow: 0 3px 10px rgba(10,36,99,0.22); transition: opacity 0.15s; }
  .btn-save:active { opacity: 0.85; }

  /* CONTEXT MENU */
  .ctx-overlay { position: fixed; inset: 0; z-index: 300; display: flex; align-items: flex-end; background: rgba(10,36,99,0.28); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .ctx-overlay.open { opacity: 1; pointer-events: all; }
  .ctx-menu { background: white; border-radius: 20px 20px 0 0; width: 100%; padding: 20px 20px calc(var(--safe-bottom) + 20px); transform: translateY(20px); transition: transform 0.25s ease; box-shadow: 0 -4px 24px rgba(10,36,99,0.12); }
  .ctx-overlay.open .ctx-menu { transform: translateY(0); }
  .ctx-project-name  { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .ctx-section-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #b0bccf; margin-bottom: 8px; }
  .quick-status { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 14px; }
  .qs-btn { border: 1.5px solid; border-radius: 9px; padding: 9px 4px; font-family: 'Varela Round', sans-serif; font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; text-align: center; transition: opacity 0.15s; background: white; }
  .qs-btn[data-s="pendiente"] { border-color: rgba(224,92,42,0.35);  color: var(--pending); }
  .qs-btn[data-s="proceso"]   { border-color: rgba(62,146,204,0.35); color: var(--process); }
  .qs-btn[data-s="terminado"] { border-color: rgba(26,158,92,0.35);  color: var(--done); }
  .ctx-btn { display: flex; align-items: center; gap: 12px; width: 100%; background: none; border: none; padding: 13px 0; color: var(--text); font-family: 'Varela Round', sans-serif; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid var(--border); text-align: left; transition: color 0.15s; }
  .ctx-btn:last-child { border-bottom: none; }
  .ctx-btn.danger { color: #dc2626; }
  .ctx-btn:hover { color: var(--primary); }
  .ctx-btn.danger:hover { color: #b91c1c; }
  .ctx-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-logo-wrap">
    <span class="auth-logo-v">⚜</span>
    <div class="auth-logo-text">
      <span class="auth-logo-ing">Ing. Sergeo Olivera S.</span>
      <span class="auth-logo-name">Verificación SOS</span>
      <span class="auth-logo-tag">verificacionsos.pe</span>
    </div>
  </div>
  <div class="auth-card">
    <div id="authSpinner" class="auth-spinner"></div>
    <div id="authIcon"  class="auth-icon"  style="display:none"></div>
    <div id="authTitle" class="auth-title" style="display:none"></div>
    <p   id="authDesc"  class="auth-desc"  style="display:none"></p>
    <button class="btn-google" id="btnGoogle" style="display:none" onclick="loginWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span id="googleBtnText">Iniciar sesión con Google</span>
    </button>
    <button class="btn-back-auth" id="btnBack" style="display:none" onclick="window.location.href='index.html'">← Volver al inicio</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="btn-home">←</a>
      <div class="topbar-brand">
        <div class="name">CRM · Proyectos</div>
        <div class="sub">verificacionsos.pe</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="user-chip" id="userChip" style="display:none">
        <img class="user-avatar" id="userAvatar" src="" alt="">
        <span class="user-name" id="userName"></span>
      </div>
      <button class="btn-new" onclick="openNew()">+ Nuevo</button>
    </div>
  </div>

  <div class="gold-bar"></div>

  <div class="page-header">
    <div>
      <div class="page-header-title">Gestión de Proyectos</div>
      <div class="page-header-sub">Pendiente · En Proceso · Terminado</div>
    </div>
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" style="opacity:0.35">
      <rect x="3" y="4" width="18" height="16" rx="2" stroke="white" stroke-width="2"/>
      <path d="M3 9h18M8 4V2M16 4V2M7 14h4M7 17h6" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="stats-row">
    <div class="stat-chip active" data-filter="all"       onclick="setFilter('all',this)">

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, getDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const cfg = { apiKey:"AIzaSyBYHXbX2Ra8RMF_un8N610jEjsDn9Rvw0U", authDomain:"verificacionsos-d55a6.firebaseapp.com", projectId:"verificacionsos-d55a6", storageBucket:"verificacionsos-d55a6.firebasestorage.app", messagingSenderId:"17499432341", appId:"1:17499432341:web:147e6abbc7b3dff3fb829c" };
const app  = getApps().length ? getApps()[0] : initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);
const prov = new GoogleAuthProvider();

async function isAuthorized(email) {
  try {
    const snap = await getDoc(doc(db,'panel_config','authorized_emails'));
    return snap.exists() && (snap.data().emails||[]).includes(email);
  } catch { return false; }
}

function showAuth(mode, msg) {
  document.getElementById('authSpinner').style.display = 'none';
  ['authIcon','authTitle','authDesc'].forEach(id => document.getElementById(id).style.display = 'block');
  document.getElementById('authDesc').textContent = msg;
  if (mode === 'login') {
    document.getElementById('authIcon').textContent  = '🔒';
    document.getElementById('authTitle').textContent = 'Acceso Privado';
    document.getElementById('authDesc').className    = 'auth-desc';
    document.getElementById('btnGoogle').style.display = 'flex';
  } else {
    document.getElementById('authIcon').textContent  = '⛔';
    document.getElementById('authTitle').textContent = 'Sin Acceso';
    document.getElementById('authDesc').className    = 'auth-desc error';
  }
  document.getElementById('btnBack').style.display = 'block';
}

function launch(user) {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  document.getElementById('userName').textContent = user.displayName?.split(' ')[0] || user.email.split('@')[0];
  if (user.photoURL) { document.getElementById('userAvatar').src = user.photoURL; document.getElementById('userChip').style.display = 'flex'; }
  if (typeof render === 'function') render();
}

window.loginWithGoogle = async () => {
  const btn = document.getElementById('btnGoogle');
  document.getElementById('googleBtnText').textContent = 'Verificando...';
  btn.disabled = true;
  try { await signInWithPopup(auth, prov); }
  catch(e) { document.getElementById('googleBtnText').textContent = 'Iniciar sesión con Google'; btn.disabled = false; }
};

onAuthStateChanged(auth, async user => {
  if (!user) { showAuth('login','Esta sección es privada. Inicia sesión con tu cuenta autorizada.'); return; }
  if (await isAuthorized(user.email)) { launch(user); }
  else { showAuth('denied', `Tu cuenta (${user.email}) no tiene acceso. Contacta al administrador.`); await auth.signOut(); }
});
</script>

<!-- CRM LOGIC -->
<script>
const KEY = 'crm_vsp_v1';
let projects=[], filter='all', editingId=null, ctxId=null, formStatus='pendiente', formUrgent=false;
const TYPES = {dron:'🚁 Dron',gis:'🗺 GIS',web:'💻 Web',consulta:'📋 Consultoría',otro:'📦 Otro'};
const LABELS = {pendiente:'Pendiente',proceso:'En Proceso',terminado:'Terminado'};
const DOT_COLORS = {pendiente:'var(--pending)',proceso:'var(--process)',terminado:'var(--done)'};

function load(){ try{ projects=JSON.parse(localStorage.getItem(KEY))||[]; }catch{ projects=[]; } }
function save(){ localStorage.setItem(KEY,JSON.stringify(projects)); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function today(){ return new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short'}); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setFilter(f,el){ filter=f; document.querySelectorAll('.stat-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); render(); }

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const c={all:projects.length,pendiente:0,proceso:0,terminado:0,urgent:0};
  projects.forEach(p=>{ c[p.status]++; if(p.urgent) c.urgent++; });
  Object.keys(c).forEach(k=>{ const el=document.getElementById('cnt-'+k); if(el) el.textContent=c[k]; });

  let list=projects.filter(p=> filter==='urgent'?p.urgent : filter!=='all'?p.status===filter : true);
  if(q) list=list.filter(p=> p.name.toLowerCase().includes(q)||p.client.toLowerCase().includes(q)||(p.notes||'').toLowerCase().includes(q));

  const board=document.getElementById('board'); if(!board) return; board.innerHTML='';
  const cols=(filter==='all'||filter==='urgent')?['pendiente','proceso','terminado']:[filter];

  cols.forEach(s=>{
    const items=filter==='urgent'?list.filter(p=>p.status===s):list.filter(p=>p.status===s);
    const div=document.createElement('div');
    div.innerHTML=`<div class="col-header"><div class="col-title"><span class="col-dot" style="background:${DOT_COLORS[s]}"></span>${LABELS[s]}</div><span class="col-count">${items.length}</span></div>`;
    if(!items.length){ div.innerHTML+=`<div class="empty-col">Sin proyectos aquí</div>`; }
    else { items.forEach(p=>div.appendChild(makeCard(p))); }
    board.appendChild(div);
  });
}

function makeCard(p){
  const el=document.createElement('div');
  el.className=`card ${p.status}${p.urgent?' card-urgent':''}`;
  el.innerHTML=`
    <div class="card-header">
      <div class="card-name">${esc(p.name)}</div>
      <button class="card-menu-btn" onclick="openCtx('${p.id}',event)">⋯</button>
    </div>
    <div class="card-client">${esc(p.client)}</div>
    ${p.notes?`<div class="card-notes">${esc(p.notes)}</div>`:''}
    <div class="card-footer">
      <span class="card-type">${TYPES[p.type]||p.type}</span>
      <div style="display:flex;align-items:center;gap:5px">
        <span class="status-pill ${p.status}">${LABELS[p.status]}</span>
        ${p.urgent?'<span class="urgent-badge">🔥 Urgente</span>':''}
        <span class="card-date">${p.date}</span>
      </div>
    </div>`;
  el.addEventListener('click',e=>{ if(e.target.classList.contains('card-menu-btn')) return; openEdit(p.id); });
  return el;
}

function openNew(){ editingId=null; formStatus='pendiente'; formUrgent=false; document.getElementById('modalTitle').textContent='Nuevo Proyecto'; ['f-name','f-client','f-contact','f-notes'].forEach(id=>document.getElementById(id).value=''); document.getElementById('f-type').value='dron'; syncStatusBtns(); syncUrgentToggle(); document.getElementById('overlay').classList.add('open'); setTimeout(()=>document.getElementById('f-name').focus(),350); }
function openEdit(id){ const p=projects.find(x=>x.id===id); if(!p) return; editingId=id; formStatus=p.status; formUrgent=p.urgent; document.getElementById('modalTitle').textContent='Editar Proyecto'; document.getElementById('f-name').value=p.name; document.getElementById('f-client').value=p.client; document.getElementById('f-type').value=p.type; document.getElementById('f-contact').value=p.contact||''; document.getElementById('f-notes').value=p.notes||''; syncStatusBtns(); syncUrgentToggle(); document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
function selectStatus(s){ formStatus=s; syncStatusBtns(); }
function syncStatusBtns(){ document.querySelectorAll('.status-btn').forEach(b=>{ b.className='status-btn'; if(b.dataset.s===formStatus) b.classList.add('active-'+formStatus); }); }
function toggleUrgent(){ formUrgent=!formUrgent; syncUrgentToggle(); }
function syncUrgentToggle(){ document.getElementById('urgentToggle').classList.toggle('on',formUrgent); }
function saveProject(){ const name=document.getElementById('f-name').value.trim(), client=document.getElementById('f-client').value.trim(); if(!name||!client){ alert('Nombre y cliente son obligatorios.'); return; } const d={name,client,type:document.getElementById('f-type').value,status:formStatus,contact:document.getElementById('f-contact').value.trim(),notes:document.getElementById('f-notes').value.trim(),urgent:formUrgent}; if(editingId){ const p=projects.find(x=>x.id===editingId); if(p) Object.assign(p,d); } else { projects.unshift({id:uid(),date:today(),...d}); } save(); closeModal(); render(); }

function openCtx(id,e){ e.stopPropagation(); ctxId=id; const p=projects.find(x=>x.id===id); document.getElementById('ctxName').textContent=p?p.name:'—'; document.getElementById('ctxOverlay').classList.add('open'); }
function closeCtx(){ document.getElementById('ctxOverlay').classList.remove('open'); ctxId=null; }
function quickStatus(s){ const p=projects.find(x=>x.id===ctxId); if(p){p.status=s;save();render();} closeCtx(); }
function editFromCtx(){ const id=ctxId; closeCtx(); setTimeout(()=>openEdit(id),150); }
function deleteFromCtx(){ const p=projects.find(x=>x.id===ctxId); if(p&&confirm(`¿Eliminar "${p.name}"?`)){projects=projects.filter(x=>x.id!==ctxId);save();render();} closeCtx(); }

load();
</script>
